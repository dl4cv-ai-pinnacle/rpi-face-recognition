repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run --group dev ruff format
        language: system
        types_or: [python]
      - id: ruff-check
        name: ruff check
        entry: uv run --group dev ruff check --fix
        language: system
        types_or: [python]
      - id: pyright
        name: pyright
        entry: uv run --group dev pyright
        language: system
        pass_filenames: false
